services:
  postgres:
    image: postgres:16-alpine
    container_name: accessflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: accessflow
      POSTGRES_USER: accessflow
      POSTGRES_PASSWORD: accessflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accessflow -d accessflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - accessflow-postgres:/var/lib/postgresql/data

volumes:
  accessflow-postgres:
